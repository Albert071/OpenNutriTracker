name: Build release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # envied reads from a .env file at the repo root; create it from secrets
      - name: Create .env
        run: |
          echo "FDC_API_KEY=${{ secrets.FDC_API_KEY }}" >> .env
          echo "SENTRY_DNS=${{ secrets.SENTRY_DNS }}" >> .env
          echo "SUPABASE_PROJECT_URL=${{ secrets.SUPABASE_PROJECT_URL }}" >> .env
          echo "SUPABASE_PROJECT_ANON_KEY=${{ secrets.SUPABASE_PROJECT_ANON_KEY }}" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (envied + hive)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --debug --flavor full

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-debug.apk
          name: Release ${{ github.ref_name }}
          body: |
            Auto-built release APK.

            **Install:** download `app-release.apk`, transfer to your phone,
            and install (you may need to allow "Install from unknown sources"
            in your phone's settings).
