name: Catalog build and apply

# Single-job catalog pipeline: build → tofu plan → tofu apply,
# all on one runner with a shared filesystem. The previous
# multi-job design with the `tofu-apply` environment gate has
# been removed; the approval gate is now PR review and the merge
# button.
#
# Trigger map:
#
#   push to main / feature/offline-off-catalog        → build + plan + apply
#   workflow_dispatch on main                          → build + plan + apply
#   workflow_dispatch on feature/offline-off-catalog   → build + plan
#   pull_request (catalog / opentofu / workflow paths) → build + plan
#   schedule (Saturday 19:00 UTC, main only)           → build + plan
#                                                        (drift detection,
#                                                         no apply)
#
# A pull request runs everything except the final apply step,
# which means a reviewer can read the plan output in CI before
# approving the merge. The plan that fires post-merge should
# normally match the PR-time plan; if upstream resources have
# drifted in the meantime the post-merge plan output surfaces
# the difference, so visibility isn't lost.
#
# Fork PRs (most contributor PRs on this project — see
# CONTRIBUTING for how community changes flow in) don't have
# access to repository secrets, so the OpenTofu steps are
# skipped on those. The catalog build itself still runs, which
# catches the schema, CSV, and build-script regressions that
# matter most for a contributor's first review pass. A
# maintainer pushes a follow-up to a same-repo branch (or
# merges, then watches the post-merge run) to revalidate the
# plan with secrets attached.
#
# Hard 9.7 GiB upload ceiling enforced as a step between build
# and plan; runs whose chunked output exceeds the ceiling fail
# before tofu sees them. Belt-and-braces against a runaway
# variant matrix or a schema mistake quietly multiplying the
# CDN bill. The current 16 variants come to about 3.51 GiB, so
# there is plenty of headroom; raising this should always be a
# deliberate code change rather than a rubber-stamp.
#
# When this lands on main: remove `feature/offline-off-catalog`
# from the push-branches list so main-side activity is the only
# thing that auto-applies. The push and pull_request triggers
# both carry a `paths:` filter, so a change that only touches
# Flutter / docs / fastlane code won't fire this workflow at
# all — and the matching `paths-ignore:` filter on
# default_workflow.yml means the reverse is also true: a
# catalog-only change won't pay for a full Flutter analyze and
# iOS/Android build. The Saturday cron and `workflow_dispatch`
# both fire unconditionally, since neither carries a path
# filter (cron triggers can't, and a manual dispatch is always
# deliberate).
#
# Bootstrap secrets (manually managed in repo settings):
#   CLOUDFLARE_API_TOKEN     — opentofu-bootstrap CF token
#   TF_GITHUB_TOKEN          — PAT with `repo` scope for github provider
#   AWS_ACCESS_KEY_ID        — state bucket R2 access key
#   AWS_SECRET_ACCESS_KEY    — state bucket R2 secret key
#   TF_VAR_account_id, TF_VAR_zone_id_opennutritracker_org
#   TF_VAR_STATE_PASSPHRASE  — state-encryption passphrase (see tofu.tf)
#
# Reference docs:
#   docs/catalog_build.md — what the build produces and why
#   docs/opentofu.md      — what the apply manages and the recovery story

on:
  push:
    branches:
      - main
      - feature/offline-off-catalog
    paths:
      - tools/catalog_build/**
      - opentofu/**
      - .github/workflows/build_catalog.yml
  pull_request:
    paths:
      - tools/catalog_build/**
      - opentofu/**
      - .github/workflows/build_catalog.yml
  schedule:
    # 19:00 UTC every Saturday — ~7pm UK winter / ~8pm UK summer.
    # The cron only fires on the default branch (main), which is
    # what we want; pinning the head_branch is unnecessary.
    - cron: '0 19 * * 6'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  # Push, cron and dispatch share one group so applies serialise
  # against the tofu state file. Pull requests get a per-PR group
  # so a fix-up push cancels the in-flight plan for the previous
  # SHA, which is the standard CI-on-PR optimisation.
  group: ${{ github.event_name == 'pull_request' && format('catalog-pr-{0}', github.event.pull_request.number) || 'catalog-pipeline' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build_and_apply:
    name: Build, plan, apply
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      # Captured just before `tofu plan` begins, which is the
      # earliest point at which this run could have taken the
      # state lock. Both plan and apply lock state by default
      # (the `-lock` flag defaults to true on each), so a run
      # killed mid-plan can leak the lockfile in the same way a
      # run killed mid-apply can. The cleanup job below uses
      # this boundary to distinguish a lockfile this run
      # created (safe to remove) from one that belongs to
      # another process such as a developer's laptop apply
      # (must not be touched). Empty when the tofu steps were
      # skipped, e.g. on a fork PR with no secrets.
      tofu_started_at: ${{ steps.tofu_started.outputs.epoch }}

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Free disk space
        # Strip the pre-installed Android SDK / .NET / Haskell
        # toolchains so we have enough headroom for the OFF CSV
        # plus trimmed CSVs plus the largest sqlite (~3.8 GB) at
        # peak.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
                      /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean
          df -h /

      - name: Install pigz
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pigz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: tools/catalog_build/requirements.txt

      - name: Install Python deps
        run: pip install -r tools/catalog_build/requirements.txt

      - name: Build catalog
        env:
          WORK: ${{ github.workspace }}/work
        run: bash tools/catalog_build/build_catalog.sh

      - name: Enforce 9.7 GiB upload ceiling
        run: |
          set -euo pipefail
          TOTAL=$(du -sb "${{ github.workspace }}/work/dbs" | awk '{print $1}')
          CEIL=10415295693  # 9.7 GiB in bytes (9.7 * 1024^3, rounded down)
          HUMAN=$(numfmt --to=iec --suffix=B "$TOTAL")
          if [[ "$TOTAL" -gt "$CEIL" ]]; then
            echo "::error title=Catalog upload over budget::Catalog totals ${HUMAN}, above the 9.7 GiB ceiling. Refusing the upload."
            exit 1
          fi
          echo "Catalog totals ${HUMAN} (under the 9.7 GiB ceiling)."
          if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
            echo "**Total upload size:** ${HUMAN} (under 9.7 GiB ceiling)" >> "$GITHUB_STEP_SUMMARY"
          fi

      # The OpenTofu steps below need repository secrets. Fork
      # PRs deliberately don't expose `secrets.*`, so we skip
      # plan and apply on those — the build above still gives
      # contributors a green check on the catalog-build side.
      - name: Set up OpenTofu
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.11.6
          tofu_wrapper: false

      - name: Install pynacl (for scripts/seal.py)
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: pip install --user pynacl

      - name: tofu init
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # `tofu init` already needs the encryption passphrase
          # because reading the existing state during init goes
          # through the encryption layer.
          TF_VAR_state_passphrase: ${{ secrets.TF_VAR_STATE_PASSPHRASE }}
        working-directory: opentofu/infrastructure
        run: tofu init

      - name: Record tofu start time
        # Used by the cleanup job below as a safety boundary:
        # any lockfile created before this moment must belong
        # to a different process (most plausibly a developer's
        # laptop apply) and must not be force-removed. Recorded
        # before `tofu plan` rather than before `tofu apply`
        # because plan also takes the state lock, so a killed
        # plan can leak the lockfile in the same way a killed
        # apply can.
        id: tofu_started
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: echo "epoch=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: tofu plan
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.TF_GITHUB_TOKEN }}
          TF_VAR_account_id: ${{ secrets.TF_VAR_ACCOUNT_ID }}
          TF_VAR_zone_id_opennutritracker_org: ${{ secrets.TF_VAR_ZONE_ID_OPENNUTRITRACKER_ORG }}
          TF_VAR_state_passphrase: ${{ secrets.TF_VAR_STATE_PASSPHRASE }}
          # Point the catalog module at the chunks the build
          # step just produced. OpenTofu fileset()s this
          # directory and hashes every file at plan time, so
          # unchanged chunks produce no diff and no API call.
          TF_VAR_catalog_build_output_dir: ${{ github.workspace }}/work/dbs
        working-directory: opentofu/infrastructure
        run: tofu plan -out=tfplan

      - name: tofu apply
        # Apply runs on:
        #   - push to main (post-merge of a reviewed PR)
        #   - push to feature/offline-off-catalog (active dev)
        #   - manual workflow_dispatch on main only
        #
        # Apply does NOT run on:
        #   - any pull_request (the merge is the approval gate)
        #   - the Saturday cron (drift-detection plan only —
        #     cron applies are the kind of unattended mutation
        #     that should never be the surprise change in
        #     Cloudflare state)
        #   - workflow_dispatch on the feature branch (the
        #     branch is mid-development; if you want to apply
        #     from it, use a push instead so the change is at
        #     least visible in git history)
        if: |
          github.event_name == 'push'
          || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.TF_GITHUB_TOKEN }}
          TF_VAR_account_id: ${{ secrets.TF_VAR_ACCOUNT_ID }}
          TF_VAR_zone_id_opennutritracker_org: ${{ secrets.TF_VAR_ZONE_ID_OPENNUTRITRACKER_ORG }}
          TF_VAR_state_passphrase: ${{ secrets.TF_VAR_STATE_PASSPHRASE }}
          TF_VAR_catalog_build_output_dir: ${{ github.workspace }}/work/dbs
        working-directory: opentofu/infrastructure
        run: tofu apply tfplan

      - name: Disk after run
        if: always()
        run: df -h /

  unlock_on_failure:
    name: Clear stale state lock
    needs: build_and_apply
    # Runs only when the main job did not complete cleanly *and*
    # a tofu state-touching operation was actually attempted
    # (tofu_started_at is empty for fork PRs, where the plan and
    # apply steps are skipped because secrets are not exposed).
    # We intentionally do not fire on `success`, where tofu has
    # already released the lock itself, nor on `skipped`, where
    # the main job never ran.
    if: |
      always()
      && (needs.build_and_apply.result == 'failure' || needs.build_and_apply.result == 'cancelled')
      && needs.build_and_apply.outputs.tofu_started_at != ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      # The cleanup must serialise with any other apply, so it
      # joins the same group as the main pipeline rather than
      # racing against a fresh push that started while this run
      # was dying.
      group: catalog-pipeline
      cancel-in-progress: false

    steps:
      - name: Remove stale lockfile if it belongs to this run
        # The lockfile is a tiny JSON object that OpenTofu's S3
        # backend writes at `<state-key>.tflock` when it takes
        # the state lock. A graceful tofu exit deletes it; a
        # killed runner leaves it behind. We delete the object
        # directly via the S3 API rather than running
        # `tofu force-unlock`, which would require a full
        # `tofu init` (re-decrypting state, re-pulling
        # providers) for what is, mechanically, a single delete.
        #
        # The safety guard is a timestamp check: only remove the
        # lockfile if its `Created` time is after the first
        # tofu step started in this run. Any earlier lockfile
        # belongs to a different process — most plausibly a
        # developer's laptop apply that started before our run
        # did — and force-removing it would let two writers
        # race the state file. The window of risk shrinks to
        # the fraction of a second between recording
        # `tofu_started_at` and tofu actually acquiring the
        # lock during plan.
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL_S3: https://a153d41f71b3aab3d15561bce23110ec.r2.cloudflarestorage.com
          TOFU_STARTED_AT: ${{ needs.build_and_apply.outputs.tofu_started_at }}
        run: |
          set -euo pipefail

          if ! aws s3api get-object \
              --bucket opennutritracker-tf-state \
              --key cloudflare/terraform.tfstate.tflock \
              /tmp/lockfile >/dev/null 2>&1; then
            echo "No lockfile present at cloudflare/terraform.tfstate.tflock;" \
                 "tofu released its lock cleanly. Nothing to do."
            exit 0
          fi

          LOCK_CREATED=$(jq -r '.Created' /tmp/lockfile)
          LOCK_ID=$(jq -r '.ID' /tmp/lockfile)
          LOCK_EPOCH=$(date -u -d "$LOCK_CREATED" +%s)

          if [[ "$LOCK_EPOCH" -lt "$TOFU_STARTED_AT" ]]; then
            echo "Lockfile created at $LOCK_CREATED predates this run's first" \
                 "tofu step (started $(date -u -d "@$TOFU_STARTED_AT")). It" \
                 "belongs to another process — most likely a developer apply" \
                 "running in parallel — so we will not touch it. A maintainer" \
                 "can force-unlock manually if it is genuinely stale."
            exit 0
          fi

          echo "Removing stale lockfile (lock ID $LOCK_ID, created" \
               "$LOCK_CREATED) left behind by this run's interrupted tofu" \
               "operation."
          aws s3api delete-object \
            --bucket opennutritracker-tf-state \
            --key cloudflare/terraform.tfstate.tflock
