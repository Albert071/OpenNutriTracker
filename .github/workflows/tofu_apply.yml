name: Tofu apply

# Manages the Cloudflare infrastructure for the offline catalog.
#
# How the triggers map to behaviour:
#
#   pull_request (paths touch opentofu/cloudflare/**)
#     → init + plan only. The plan output sits in the run logs for
#       reviewers to read alongside the PR. No state is written.
#
#   push to main (paths touch opentofu/cloudflare/**)
#     → init + plan, then apply gated on manual approval.
#       The apply job uses the `tofu-apply` environment, which is
#       configured in repo settings to require a reviewer's approval
#       before the apply runs. The plan artifact uploaded by the
#       plan job is downloaded by the apply job, so we apply the
#       *same* plan that was reviewed.
#
#   schedule (weekly cron)
#     → init + plan + apply, with NO approval gate. The cron's
#       purpose is to nudge the catalog rebuild even when the
#       infrastructure has not changed; pausing every weekly run
#       on a manual approval defeats the point. Guarded with a
#       `github.ref == 'refs/heads/main'` check so a cron firing
#       from a non-main default branch (during transition periods)
#       does not silently apply a different branch's config.
#
#   workflow_dispatch
#     → init + plan + apply, behind the same approval gate as the
#       push trigger. Useful for re-running an apply after a
#       manual fix.
#
# Bootstrap secrets (manually managed in repo settings):
#   CLOUDFLARE_API_TOKEN     — opentofu-bootstrap CF token
#   TF_GITHUB_TOKEN          — PAT with `repo` scope for github provider
#   AWS_ACCESS_KEY_ID        — state bucket R2 access key
#   AWS_SECRET_ACCESS_KEY    — state bucket R2 secret key
#   TF_VAR_account_id, TF_VAR_zone_id_opennutritracker_org
#   TF_VAR_STATE_PASSPHRASE  — passphrase used by the OpenTofu state-
#                              file encryption layer (see encryption.tf).
#                              Lose this and the state cannot be decrypted.
#
# One-time environment setup (needs repo admin rights):
#   Settings → Environments → New environment → "tofu-apply".
#   Required reviewers: at least one. Without this, the gated apply
#   job will run unattended, defeating the approval gate.

on:
  pull_request:
    paths:
      - 'opentofu/cloudflare/**'
      - '.github/workflows/tofu_apply.yml'
  push:
    branches:
      - main
    paths:
      - 'opentofu/cloudflare/**'
      - '.github/workflows/tofu_apply.yml'
  schedule:
    # 19:00 UTC every Saturday — ~7pm UK winter / ~8pm UK summer.
    # The chained catalog build then runs through Saturday evening.
    - cron: '0 19 * * 6'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opentofu/cloudflare
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.11.6
          tofu_wrapper: false

      - name: Set up Python (for the github-secret sealer)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pynacl (for scripts/seal.py)
        run: pip install --user pynacl

      - name: tofu init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # `tofu init` already needs the encryption passphrase
          # because reading the existing state during init goes
          # through the encryption layer.
          TF_VAR_state_passphrase: ${{ secrets.TF_VAR_STATE_PASSPHRASE }}
        run: tofu init

      - name: tofu plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.TF_GITHUB_TOKEN }}
          TF_VAR_account_id: ${{ secrets.TF_VAR_ACCOUNT_ID }}
          TF_VAR_zone_id_opennutritracker_org: ${{ secrets.TF_VAR_ZONE_ID_OPENNUTRITRACKER_ORG }}
          TF_VAR_state_passphrase: ${{ secrets.TF_VAR_STATE_PASSPHRASE }}
        run: tofu plan -out=tfplan

      - name: Upload plan artifact
        # The PR-only plan does not need to ship its plan binary
        # anywhere — the run log is the review surface. Apply jobs
        # for push / schedule / dispatch consume the artifact so
        # the apply runs against the exact plan the human approved.
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: opentofu/cloudflare/tfplan
          retention-days: 1

  apply:
    name: Apply (gated)
    needs: plan
    # Push-to-main and manual-dispatch applies sit behind the
    # `tofu-apply` environment's required reviewer. The cron path
    # uses `apply_scheduled` below so it can run unattended.
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: tofu-apply
    concurrency:
      # Single global lock across both apply jobs so the cron and a
      # human apply can never race for the state file. Plans run
      # outside this group because they are read-only.
      group: tofu-apply-state
      cancel-in-progress: false
    defaults:
      run:
        working-directory: opentofu/cloudflare
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.11.6
          tofu_wrapper: false

      - name: Set up Python (for the github-secret sealer)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pynacl (for scripts/seal.py)
        run: pip install --user pynacl

      - name: tofu init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_state_passphrase: ${{ secrets.TF_VAR_STATE_PASSPHRASE }}
        run: tofu init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: opentofu/cloudflare

      - name: tofu apply (saved plan)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.TF_GITHUB_TOKEN }}
          TF_VAR_account_id: ${{ secrets.TF_VAR_ACCOUNT_ID }}
          TF_VAR_zone_id_opennutritracker_org: ${{ secrets.TF_VAR_ZONE_ID_OPENNUTRITRACKER_ORG }}
          TF_VAR_state_passphrase: ${{ secrets.TF_VAR_STATE_PASSPHRASE }}
        run: tofu apply tfplan

  apply_scheduled:
    name: Apply (weekly cron)
    needs: plan
    # The weekly cron applies unattended. We still gate on the plan
    # job succeeding (so a config breakage on develop never gets
    # silently rolled out), but no human is in the loop.
    if: github.event_name == 'schedule' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: tofu-apply-state
      cancel-in-progress: false
    defaults:
      run:
        working-directory: opentofu/cloudflare
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.11.6
          tofu_wrapper: false

      - name: Set up Python (for the github-secret sealer)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pynacl (for scripts/seal.py)
        run: pip install --user pynacl

      - name: tofu init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_state_passphrase: ${{ secrets.TF_VAR_STATE_PASSPHRASE }}
        run: tofu init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: opentofu/cloudflare

      - name: tofu apply (saved plan, unattended)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.TF_GITHUB_TOKEN }}
          TF_VAR_account_id: ${{ secrets.TF_VAR_ACCOUNT_ID }}
          TF_VAR_zone_id_opennutritracker_org: ${{ secrets.TF_VAR_ZONE_ID_OPENNUTRITRACKER_ORG }}
          TF_VAR_state_passphrase: ${{ secrets.TF_VAR_STATE_PASSPHRASE }}
        run: tofu apply tfplan
